packages:
  - apps/*
  - packages/*
  - tools/*
  - apps/apps/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^7.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.10
  vite-plus: ^0.2.5
  zod: ^4.4.3
  portless: ^0.15.4
  drizzle-orm: 1.0.0-rc.4
  better-sqlite3: 13.0.1
  "@types/better-sqlite3": 7.6.13
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  better-sqlite3: set this to true or false
  esbuild: set this to true or false
  sharp: set this to true or false
  workerd: true
