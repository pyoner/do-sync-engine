packages:
  - apps/*
  - packages/*
  - tools/*
  - apps/apps/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.10
  vite-plus: latest
  zod: ^4.4.3
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  esbuild: set this to true or false
  sharp: set this to true or false
  workerd: true
